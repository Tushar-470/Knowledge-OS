<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Tushar Mathapati's private Knowledge OS portal.">
    <title>Knowledge OS - ChronoVault</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <canvas id="field" aria-hidden="true"></canvas>
    <main id="app" class="app-shell">
      <section id="lock" class="lock-view" aria-labelledby="title">
        <div class="brand-block">
          <p class="eyebrow">ChronoVault</p>
          <h1 id="title">Knowledge OS</h1>
          <p class="owner">Tushar Mathapati</p>
        </div>
        <form id="unlock-form" class="lock-panel">
          <label for="password">Daily access code</label>
          <div class="code-row">
            <input id="password" name="password" inputmode="numeric" autocomplete="off" maxlength="4" placeholder="0000" aria-describedby="hint">
            <button type="submit">Unlock</button>
          </div>
          <p id="hint" class="hint">Use your private date formula.</p>
          <p id="status" class="status" role="status"></p>
        </form>
      </section>

      <section id="vault" class="vault-view hidden" aria-label="Encrypted files">
        <header class="topbar">
          <div>
            <p class="eyebrow">Unlocked</p>
            <h2>Knowledge OS</h2>
          </div>
          <input id="search" type="search" placeholder="Search files">
        </header>
        <div id="folder-grid" class="folder-grid"></div>
        <section id="file-section" class="file-section hidden">
          <div class="section-head">
            <h3 id="folder-title"></h3>
            <button id="close-folder" type="button">Close</button>
          </div>
          <div id="file-grid" class="file-grid"></div>
        </section>
      </section>
    </main>

    <dialog id="preview" class="preview">
      <div class="preview-head">
        <strong id="preview-title"></strong>
        <div>
          <a id="download-link" download>Download</a>
          <button id="close-preview" type="button">Close</button>
        </div>
      </div>
      <div id="preview-body" class="preview-body"></div>
    </dialog>
    <script type="module" src="./main.js"></script>
  </body>
</html>
